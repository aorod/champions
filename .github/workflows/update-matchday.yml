name: Atualizar dados (dia de jogo)

on:
  schedule:
    # Cada 10 min — tarde/noite UTC (jogos do Centro/Leste EUA, México, Canadá)
    - cron: '*/10 12-23 11 6 *'    # Jun 11 — abertura
    - cron: '*/10 12-23 12-30 6 *' # Jun 12-30 — fase de grupos + oitavas
    - cron: '*/10 12-23 1-20 7 *'  # Jul 1-20 — mata-mata até pós-final
    # Cada 10 min — madrugada UTC (jogos da Costa Oeste EUA / Pacífico)
    # Obs: ~28 jogos do grupo iniciam entre 00h-04h UTC — janela antes descoberta
    - cron: '*/10 0-6 12-30 6 *'   # Jun 12-30 madrugada
    - cron: '*/10 0-6 1-20 7 *'    # Jul 1-20 madrugada
  workflow_dispatch:  # permite rodar manualmente pelo GitHub UI

permissions:
  contents: write   # necessário para fazer commit dos JSONs

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar dados da API
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/fetch-data.js

      - name: Verificar mudanças nos dados
        id: check
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT \
                                 || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Commit e push dos dados atualizados
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "champions-bot"
          git config user.email "bot@champions-wc2026.github.io"
          git add data/
          git commit -m "chore(data): atualização automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
